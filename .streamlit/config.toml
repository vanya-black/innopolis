# Отключаем обход всех модулей file-watcher'ом: иначе Streamlit пытается следить
# за «ленивыми» модулями transformers (image_processing_*_fast), каждый из которых
# тащит torchvision, и сыпет в лог безобидными, но шумными ModuleNotFoundError.
# Для демо горячая перезагрузка не нужна.
[server]
fileWatcherType = "none"
